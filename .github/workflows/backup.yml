name: Backup notturno dati Firestore

on:
  schedule:
    # 00:00 UTC = 02:00 in Italia in estate (CEST) / 01:00 in inverno (CET).
    - cron: "0 0 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scarica i dati da Firestore e crea il file di backup
        run: |
          python3 - <<'PYEOF'
          import json
          import os
          import urllib.request
          from datetime import datetime, timezone

          PROJECT = "scondinzolando-turni"
          BASE = f"https://firestore.googleapis.com/v1/projects/{PROJECT}/databases/(default)/documents"

          def unwrap(value):
              if not value:
                  return None
              key = next(iter(value))
              return value[key]

          def fetch_all(collection):
              docs = []
              page_token = None
              while True:
                  url = f"{BASE}/{collection}?pageSize=300"
                  if page_token:
                      url += f"&pageToken={page_token}"
                  with urllib.request.urlopen(url) as resp:
                      data = json.loads(resp.read().decode("utf-8"))
                  for doc in data.get("documents", []):
                      item = {k: unwrap(v) for k, v in doc.get("fields", {}).items()}
                      item["id"] = doc["name"].split("/")[-1]
                      docs.append(item)
                  page_token = data.get("nextPageToken")
                  if not page_token:
                      break
              return docs

          backup = {
              "exportedAt": datetime.now(timezone.utc).isoformat(),
              "entries": fetch_all("entries"),
              "log": fetch_all("log"),
          }

          os.makedirs("backups", exist_ok=True)
          date_str = datetime.now(timezone.utc).strftime("%Y-%m-%d")
          with open(f"backups/backup_{date_str}.json", "w", encoding="utf-8") as f:
              json.dump(backup, f, ensure_ascii=False, indent=2)
          with open("backups/latest.json", "w", encoding="utf-8") as f:
              json.dump(backup, f, ensure_ascii=False, indent=2)

          print(f"Backup salvato: {len(backup['entries'])} inserimenti, {len(backup['log'])} eventi di log.")
          PYEOF

      - name: Commit e push del backup (solo se ci sono cambiamenti)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          if git diff --cached --quiet; then
            echo "Nessuna modifica rispetto all'ultimo backup, salto il commit."
          else
            git commit -m "Backup automatico $(date -u +%Y-%m-%d)"
            git push
          fi
